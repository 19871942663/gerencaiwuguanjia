<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1E40AF">
  <meta name="description" content="个人财务管家 - 资产负债表、收入支出表、现金流表">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>个人财务管家</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部标题栏 -->
    <header id="header">
      <h1>个人财务管家</h1>
    </header>

    <!-- 主内容区 -->
    <main id="tab-content">
      <!-- 资产负债表 -->
      <section id="tab-balance" class="tab-panel active">
        <div class="time-toggle">
          <button data-period="week" class="period-btn">本周</button>
          <button data-period="month" class="period-btn active">本月</button>
          <button data-period="year" class="period-btn">本年</button>
          <button data-period="all" class="period-btn">全部</button>
        </div>
        <div class="empty-state" id="balance-empty">
          <p>暂无数据</p>
          <p class="hint">请先到"录入"页面添加您的资产负债记录</p>
        </div>
        <div class="chart-container">
          <canvas id="balance-chart"></canvas>
        </div>
        <div class="table-container">
          <table id="balance-table">
            <thead>
              <tr><th>项目</th><th>金额</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="comparison" id="balance-comparison"></div>
      </section>

      <!-- 收入支出表 -->
      <section id="tab-income" class="tab-panel">
        <div class="time-toggle">
          <button data-period="week" class="period-btn">本周</button>
          <button data-period="month" class="period-btn active">本月</button>
          <button data-period="year" class="period-btn">本年</button>
          <button data-period="all" class="period-btn">全部</button>
        </div>
        <div class="empty-state" id="income-empty">
          <p>暂无数据</p>
          <p class="hint">请先到"录入"页面添加您的收入支出记录</p>
        </div>
        <div class="chart-container">
          <canvas id="income-chart"></canvas>
        </div>
        <div class="table-container">
          <table id="income-table">
            <thead>
              <tr><th>项目</th><th>金额</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="comparison" id="income-comparison"></div>
        <div class="trend-section" id="income-trend-section">
          <h3 class="trend-title" id="income-trend-title">每日收支趋势</h3>
          <div class="chart-container">
            <canvas id="income-trend-chart"></canvas>
          </div>
        </div>
      </section>

      <!-- 现金流表 -->
      <section id="tab-cashflow" class="tab-panel">
        <div class="time-toggle">
          <button data-period="week" class="period-btn">本周</button>
          <button data-period="month" class="period-btn active">本月</button>
          <button data-period="year" class="period-btn">本年</button>
          <button data-period="all" class="period-btn">全部</button>
        </div>
        <div class="empty-state" id="cashflow-empty">
          <p>暂无数据</p>
          <p class="hint">请先到"录入"页面添加您的现金流记录</p>
        </div>
        <div class="chart-container">
          <canvas id="cashflow-chart"></canvas>
        </div>
        <div class="table-container">
          <table id="cashflow-table">
            <thead>
              <tr><th>项目</th><th>金额</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="comparison" id="cashflow-comparison"></div>
        <div class="trend-section" id="cashflow-trend-section">
          <h3 class="trend-title" id="cashflow-trend-title">每日现金流趋势</h3>
          <div class="chart-container">
            <canvas id="cashflow-trend-chart"></canvas>
          </div>
        </div>
      </section>

      <!-- 录入数据 -->
      <section id="tab-entry" class="tab-panel">
        <button id="btn-add-entry" class="btn-primary">+ 添加记录</button>
        <div id="entry-form-container" class="form-overlay" style="display:none;"></div>
        <div class="entry-filter">
          <select id="filter-type">
            <option value="all">全部类型</option>
            <option value="asset">资产</option>
            <option value="liability">负债</option>
            <option value="income">收入</option>
            <option value="expense">支出</option>
            <option value="cash_inflow">现金流入</option>
            <option value="cash_outflow">现金流出</option>
          </select>
          <select id="filter-month">
            <option value="all">全部月份</option>
          </select>
        </div>
        <div class="entry-list" id="entry-list">
          <p class="empty-hint">暂无记录，点击上方按钮添加</p>
        </div>
      </section>
    </main>

    <!-- 底部 Tab 导航 -->
    <nav id="tab-bar">
      <button data-tab="balance" class="tab-btn">
        <span class="tab-icon">📊</span>
        <span class="tab-label">资产负债</span>
      </button>
      <button data-tab="income" class="tab-btn">
        <span class="tab-icon">📈</span>
        <span class="tab-label">收入支出</span>
      </button>
      <button data-tab="cashflow" class="tab-btn">
        <span class="tab-icon">💵</span>
        <span class="tab-label">现金流</span>
      </button>
      <button data-tab="entry" class="tab-btn">
        <span class="tab-icon">📝</span>
        <span class="tab-label">录入</span>
      </button>
    </nav>

    <!-- 同步状态栏 -->
    <div id="sync-bar">
      <span id="sync-status-dot" class="dot offline"></span>
      <span id="sync-status-text">离线</span>
      <span class="sync-separator">|</span>
      <span id="sync-pending-text">等待同步: 0条</span>
    </div>
  </div>

  <!-- 第三方库 -->
  <script src="lib/dexie.min.js"></script>
  <script src="lib/chart.umd.min.js"></script>
  <script src="lib/supabase.min.js"></script>

  <!-- 应用模块（加载顺序重要） -->
  <script src="js/db.js"></script>
  <script src="js/statements.js"></script>
  <script src="js/time-views.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
